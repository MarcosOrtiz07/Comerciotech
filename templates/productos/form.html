{% extends "base.html" %}
{% block title %}{{ 'Editar' if editando else 'Nuevo' }} Producto | ComercioTech{% endblock %}

{% block content %}
<div class="page-header">
    <h4><i class="bi bi-box-seam me-2"></i>{{ 'Editar' if editando else 'Nuevo' }} Producto</h4>
    <a href="{{ url_for('productos.listar') }}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i>Volver
    </a>
</div>

<div class="card card-form shadow-sm">
    <div class="card-header">
        <i class="bi bi-{{ 'pencil-square' if editando else 'box-seam' }} me-2"></i>
        {{ 'Editar Producto' if editando else 'Registrar Nuevo Producto' }}
    </div>
    <div class="card-body">
        <form method="POST" class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Nombre <span class="text-danger">*</span></label>
                <input type="text" class="form-control form-control-sm" name="nombre" value="{{ producto.nombre or '' }}" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">Categoria <span class="text-danger">*</span></label>
                <select class="form-select form-select-sm" name="categoria">
                    <option value="">Seleccionar...</option>
                    {% for cat in categorias %}
                    <option value="{{ cat }}" {% if producto.categoria == cat %}selected{% endif %}>{{ cat }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label">Precio <span class="text-danger">*</span></label>
                <div class="input-group input-group-sm">
                    <span class="input-group-text">$</span>
                    <input type="number" class="form-control" name="precio" step="0.01" min="0" value="{{ producto.precio or 0 }}" required>
                </div>
            </div>
            <div class="col-md-3">
                <label class="form-label">Stock <span class="text-danger">*</span></label>
                <input type="number" class="form-control form-control-sm" name="stock" min="0" value="{{ producto.stock or 0 }}" required>
            </div>
            <div class="col-md-3">
                <label class="form-label">Estado</label>
                <div class="form-check form-switch pt-2">
                    <input class="form-check-input" type="checkbox" name="activo" id="activo" {% if producto.activo or producto.activo is undefined %}checked{% endif %}>
                    <label class="form-check-label small" for="activo">Producto activo</label>
                </div>
            </div>
            <div class="col-12">
                <label class="form-label">Descripcion</label>
                <textarea class="form-control form-control-sm" name="descripcion" rows="3">{{ producto.descripcion or '' }}</textarea>
            </div>
            <div class="col-12 d-flex gap-2 pt-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg me-1"></i>{{ 'Guardar Cambios' if editando else 'Crear Producto' }}
                </button>
                <a href="{{ url_for('productos.listar') }}" class="btn btn-outline-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
