<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ComercioTech | Iniciar Sesion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0a0e17 0%, #1a2332 50%, #0d1b2a 100%);
            position: relative;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 50%, rgba(13, 110, 253, 0.08) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 50%, rgba(0, 200, 255, 0.05) 0%, transparent 50%);
            animation: bgShift 20s ease-in-out infinite alternate;
        }
        @keyframes bgShift {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(-5%, -5%) rotate(5deg); }
        }
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }
        .login-card:hover {
            transform: translateY(-2px);
        }
        .login-logo {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo .logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #0d6efd, #0099ff);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 28px;
            color: #fff;
            box-shadow: 0 8px 24px rgba(13, 110, 253, 0.3);
        }
        .login-logo h1 {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin: 0;
        }
        .login-logo p {
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            margin-top: 6px;
        }
        .form-floating {
            margin-bottom: 16px;
        }
        .form-floating input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 12px;
            height: 52px;
            padding: 16px 16px 8px;
            font-size: 15px;
            transition: all 0.3s;
        }
        .form-floating input:focus {
            background: rgba(255, 255, 255, 0.08);
            border-color: #0d6efd;
            box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.15);
        }
        .form-floating input:-webkit-autofill,
        .form-floating input:-webkit-autofill:hover,
        .form-floating input:-webkit-autofill:focus {
            -webkit-text-fill-color: #fff;
            -webkit-box-shadow: 0 0 0px 1000px rgba(26, 35, 50, 1) inset;
            transition: background-color 5000s ease-in-out 0s;
        }
        .form-floating label {
            color: rgba(255, 255, 255, 0.4);
            padding: 16px 16px 8px;
            font-size: 14px;
        }
        .form-floating input:focus ~ label,
        .form-floating input:not(:placeholder-shown) ~ label {
            opacity: 0.7;
            transform: scale(0.85) translateY(-0.5rem) translateX(0.15rem);
        }
        .form-floating .form-control:focus ~ label {
            color: #0d6efd;
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            background: linear-gradient(135deg, #0d6efd, #0099ff);
            border: none;
            color: #fff;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 8px;
        }
        .btn-login:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(13, 110, 253, 0.4);
            background: linear-gradient(135deg, #0b5ed7, #0088ee);
        }
        .btn-login:active {
            transform: translateY(0);
        }
        .login-divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
            color: rgba(255, 255, 255, 0.2);
            font-size: 12px;
        }
        .login-divider::before,
        .login-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
        }
        .alert {
            border-radius: 12px;
            font-size: 13px;
            padding: 10px 14px;
            background: rgba(220, 53, 69, 0.15);
            border: 1px solid rgba(220, 53, 69, 0.3);
            color: #f8a5a5;
        }
        .alert-success {
            background: rgba(25, 135, 84, 0.15);
            border-color: rgba(25, 135, 84, 0.3);
            color: #7ddb9e;
        }
        .login-footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.2);
            font-size: 12px;
        }
        .version-badge {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.3);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            backdrop-filter: blur(10px);
            z-index: 1;
        }
        @media (max-width: 480px) {
            .login-card { padding: 30px 20px; }
            .login-logo h1 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <div class="logo-icon">
                    <i class="bi bi-database-gear"></i>
                </div>
                <h1>ComercioTech</h1>
                <p>Plataforma de gestion comercial</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                            <i class="bi bi-info-circle me-1"></i> {{ message }}
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" style="font-size:12px;"></button>
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-floating">
                    <input type="email" class="form-control" id="email" name="email" placeholder="correo@ejemplo.com" required>
                    <label for="email"><i class="bi bi-envelope me-1"></i>Correo electronico</label>
                </div>
                <div class="form-floating">
                    <input type="password" class="form-control" id="password" name="password" placeholder="Contrasena" required>
                    <label for="password"><i class="bi bi-lock me-1"></i>Contrasena</label>
                </div>
                <button type="submit" class="btn-login">
                    <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesion
                </button>
            </form>

            <div class="login-footer">
                ComercioTech v1.0.0
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
