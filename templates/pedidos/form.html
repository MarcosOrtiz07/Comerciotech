{% extends "base.html" %}
{% block title %}Nuevo Pedido | ComercioTech{% endblock %}

{% block content %}
<div class="page-header">
    <h4><i class="bi bi-cart-plus me-2"></i>Nuevo Pedido</h4>
    <a href="{{ url_for('pedidos.listar') }}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left me-1"></i>Volver
    </a>
</div>

<div class="card card-form shadow-sm">
    <div class="card-header">
        <i class="bi bi-cart-plus me-2"></i>Crear Nuevo Pedido
    </div>
    <div class="card-body">
        <form method="POST" id="pedidoForm" class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Cliente <span class="text-danger">*</span></label>
                <select class="form-select form-select-sm" name="cliente_id" required>
                    <option value="">Seleccionar cliente...</option>
                    {% for c in clientes %}
                    <option value="{{ c._id }}">{{ c.nombre }} {{ c.apellido }} ({{ c.email }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label">Estado</label>
                <select class="form-select form-select-sm" name="estado">
                    {% for e in estados %}
                    <option value="{{ e }}" {% if e == 'Pendiente' %}selected{% endif %}>{{ e }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-12">
                <hr class="my-2">
                <div class="d-flex justify-content-between align-items-center mb-2">
                    <label class="form-label mb-0 fw-semibold">Productos del Pedido</label>
                    <button type="button" class="btn btn-success btn-sm" id="addProductoBtn">
                        <i class="bi bi-plus-lg me-1"></i>Agregar Producto
                    </button>
                </div>

                <div class="table-responsive">
                    <table class="table table-sm table-bordered" id="productosTable">
                        <thead class="table-light">
                            <tr>
                                <th style="width:40%">Producto</th>
                                <th style="width:15%">Precio</th>
                                <th style="width:15%">Stock</th>
                                <th style="width:15%">Cantidad</th>
                                <th style="width:15%">Subtotal</th>
                                <th style="width:40px"></th>
                            </tr>
                        </thead>
                        <tbody id="productosBody">
                            <tr id="filaVacia">
                                <td colspan="6" class="text-center text-muted py-3">
                                    <i class="bi bi-cart me-1"></i>Agregue productos al pedido
                                </td>
                            </tr>
                        </tbody>
                        <tfoot>
                            <tr class="table-light fw-bold">
                                <td colspan="4" class="text-end">TOTAL:</td>
                                <td id="totalDisplay">$0.00</td>
                                <td></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            </div>

            <div class="col-12 d-flex gap-2 pt-2">
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-check-lg me-1"></i>Crear Pedido
                </button>
                <a href="{{ url_for('pedidos.listar') }}" class="btn btn-outline-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
var productos = {{ productos | tojson | safe }};
var productosMap = {};
productos.forEach(function(p) {
    productosMap[p._id] = p;
});

var rowIndex = 0;

function updateSubtotal(row) {
    var select = row.querySelector('.producto-select');
    var cantidad = row.querySelector('.cantidad-input');
    var precioDisplay = row.querySelector('.precio-display');
    var stockDisplay = row.querySelector('.stock-display');
    var subtotalDisplay = row.querySelector('.subtotal-display');

    var pid = select.value;
    if (!pid || !productosMap[pid]) {
        precioDisplay.textContent = '$0.00';
        stockDisplay.textContent = '0';
        subtotalDisplay.textContent = '$0.00';
        cantidad.value = 1;
        cantidad.max = 0;
        return;
    }

    var prod = productosMap[pid];
    var p = prod.precio || 0;
    var s = prod.stock || 0;
    var c = parseInt(cantidad.value) || 0;

    precioDisplay.textContent = '$' + p.toFixed(2);
    stockDisplay.textContent = s;
    cantidad.max = s;
    if (c > s) cantidad.value = s;
    if (c < 1) cantidad.value = 1;
    c = parseInt(cantidad.value) || 0;
    subtotalDisplay.textContent = '$' + (p * c).toFixed(2);
    calcularTotal();
}

function calcularTotal() {
    var total = 0;
    document.querySelectorAll('.subtotal-display').forEach(function(el) {
        var val = parseFloat(el.textContent.replace('$', '')) || 0;
        total += val;
    });
    document.getElementById('totalDisplay').textContent = '$' + total.toFixed(2);
}

function agregarFila() {
    var tbody = document.getElementById('productosBody');
    var vacia = document.getElementById('filaVacia');
    if (vacia) vacia.remove();

    var idx = rowIndex++;
    var tr = document.createElement('tr');

    var options = '<option value="">Seleccionar...</option>';
    productos.forEach(function(p) {
        options += '<option value="' + p._id + '">' + p.nombre + ' (Stock: ' + (p.stock || 0) + ')</option>';
    });

    tr.innerHTML =
        '<td>' +
        '<select class="form-select form-select-sm producto-select" name="producto_id[]" required>' +
        options +
        '</select>' +
        '</td>' +
        '<td><span class="precio-display small">$0.00</span></td>' +
        '<td><span class="stock-display small">0</span></td>' +
        '<td><input type="number" class="form-control form-control-sm cantidad-input" name="cantidad[]" value="1" min="1" max="999" required></td>' +
        '<td><span class="subtotal-display fw-semibold">$0.00</span></td>' +
        '<td><button type="button" class="btn btn-outline-danger btn-sm" onclick="eliminarFila(this)"><i class="bi bi-x"></i></button></td>';

    tbody.appendChild(tr);

    var select = tr.querySelector('.producto-select');
    var cantidad = tr.querySelector('.cantidad-input');

    select.addEventListener('change', function() { updateSubtotal(tr); });
    cantidad.addEventListener('input', function() { updateSubtotal(tr); });
}

function eliminarFila(btn) {
    var tr = btn.closest('tr');
    tr.remove();
    calcularTotal();

    var tbody = document.getElementById('productosBody');
    if (tbody.querySelectorAll('tr').length === 0) {
        tbody.innerHTML = '<tr id="filaVacia"><td colspan="6" class="text-center text-muted py-3"><i class="bi bi-cart me-1"></i>Agregue productos al pedido</td></tr>';
    }
}

document.getElementById('addProductoBtn').addEventListener('click', agregarFila);

document.getElementById('pedidoForm').addEventListener('submit', function(e) {
    var filas = document.querySelectorAll('#productosBody tr:not(#filaVacia)');
    if (filas.length === 0) {
        e.preventDefault();
        alert('Debe agregar al menos un producto al pedido.');
        return;
    }
    var algunaVacia = false;
    filas.forEach(function(f) {
        var sel = f.querySelector('.producto-select');
        if (!sel.value) algunaVacia = true;
    });
    if (algunaVacia) {
        e.preventDefault();
        alert('Seleccione un producto para cada fila.');
    }
});
</script>
{% endblock %}
